# [ mouse ]
set -g mouse on

set -g default-command "$SHELL"

# [ support ]
set -g default-terminal "tmux-256color"

set -g allow-passthrough all

set -ga terminal-overrides ',xterm-kitty:RGB'
set -as terminal-features ',xterm-kitty:RGB'

# [ bell / activity ]
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# [ clock mode ]
setw -g clock-mode-colour "#ffffff"

# [ copy mode ]
setw -g mode-style "fg=#0f0f0f,bg=#ffffff"

# [ pane borders ]
set -g pane-border-style "fg=#4d4d4d"
set -g pane-active-border-style "fg=#ffffff"

# [ status bar ]
set -g status-position bottom
set -g status-justify left
set -g status-style "fg=#d9d9d9,bg=#1a1a1a"

set -g status-left ""
set -g status-left-length 30

set -g status-right-style "fg=#0f0f0f,bg=#ffffff"
set -g status-right " %Y-%m-%d "
set -g status-right-length 100

# [ window titles ]
setw -g window-status-current-style "fg=#0f0f0f,bg=#ffffff"
setw -g window-status-current-format " #I #W #F "

setw -g window-status-style "fg=#b3b3b3,bg=#1a1a1a"
setw -g window-status-format " #I #[fg=#d9d9d9]#W #[fg=#8c8c8c]#F "

setw -g window-status-bell-style "fg=#ffffff,bg=#262626"

# [ messages ]
set -g message-style "fg=#0f0f0f,bg=#ffffff"
